spring:

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:/opt/dataease2.0/desktop;AUTO_SERVER=TRUE;AUTO_RECONNECT=TRUE;MODE=MySQL;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DATABASE_TO_UPPER=FALSE
    username: sa
    password: 123456

  h2:
    console:
      enabled: true
      path: /h2-console
  messages:
    basename: i18n/core
  flyway:
    enabled: false
    table: de_desktop_version
    validate-on-migrate: false
    locations: classpath:db/desktop
    baseline-on-migrate: true
    out-of-order: true
  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        jdbc:
          batch_size: 1000
        order_inserts: true
        order_updates: true
    hibernate:
      naming:
        physical-strategy: io.dataease.config.DynamicCaseNamingStrategy
      ddl-auto: update
    show-sql: true
mybatis-plus:
  mapper-locations: classpath:mybatis/*.xml
